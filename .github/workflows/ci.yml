name: CI Pipeline

permissions: 
  id-token: write
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  terraform:
    env: 
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }} 
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }} 
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
      ARM_USE_OIDC: true

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4

      - name: Azure Login
        uses: azure/login@v2.3.0
        with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            enable-AzPSSession: true

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
    
      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Get latest backend tag
        id: back
        run: |
          TAG=$(az acr repository show-tags \
          --name ${{ secrets.ACR_NAME }} \
          --repository team3-back-app \
          --orderby time_desc \
          --top 1 \
          --output tsv)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get latest frontend tag
        id: front
        run: |
          TAG=$(az acr repository show-tags \
          --name ${{ secrets.ACR_NAME }} \
          --repository team3-front-app \
          --orderby time_desc \
          --top 1 \
          --output tsv)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve \
          -var="backend_image_tag=${{ steps.back.outputs.tag }}" \
          -var="frontend_image_tag=${{ steps.front.outputs.tag }}"

