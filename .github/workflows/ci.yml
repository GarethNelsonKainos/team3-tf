name : CD Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

env:
    TF_VAR_environment : "dev"
    TF_VAR_location : "uksouth"
    TF_VAR_acr_login_server : ${{ secrets.ACR_LOGIN_SERVER }}
    TF_VAR_acr_id : ${{ secrets.ACR_ID }}

jobs:
    test:
        name: Test & Quality Checks. 
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                node-version: '20'

            - name: Install Frontend Dependencies
              working-directory: ./team3-front-app/team3-front-app
              run: npm install

            - name: Install Backend Dependencies
              working-directory: ./team3-back-app
              run: npm install

            - name: Run Frontend Tests
              working-directory: ./team3-front-app/team3-front-app
              run: npm run coverage
            
            - name: Run Backend Tests
              working-directory: ./team3-back-app
              run: npm run coverage

    build:
        name: Build & Deploy
        runs-on: ubuntu-latest
        needs: test
        steps:
            - uses: actions/checkout@v2

            - name: Login to ACR
              uses: azure/docker-login@v1
              with:
                login-server: ${{ secrets.ACR_LOGIN_SERVER }}
                username: ${{ secrets.ACR_USERNAME }}
                password: ${{ secrets.ACR_PASSWORD }}

            - name: Pull and Build Frontend Image
              run: |
                docker pull ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:latest || true
                docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/team3-front-app:latest -f ./team3-front-app/Dockerfile ./team3-front-app

            - name: Pull and Build Backend Image
              run: |
                docker pull ${{ secrets.ACR_LOGIN_SERVER }}/team3-back-app:latest || true
                docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/team3-back-app:latest -f ./team3-back-app/Dockerfile ./team3-back-app
            
    terraform-plan:
        name: Terraform Plan
        runs-on: ubuntu-latest
        needs: build
        env:
            ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
            ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
            ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
            ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }} 
        steps:
            - uses: actions/checkout@v2

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v1
              with:
                terraform_version: 1.5.0

            - name: Terraform Init
              working-directory: ./my-infrastructure
              run: terraform init

            - name: Terraform Plan
              working-directory: ./my-infrastructure
              run: terraform plan
              
    terraform-apply:
        name: Terraform Apply
        runs-on: ubuntu-latest
        needs: terraform-plan
        env:
            ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
            ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
            ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
            ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        steps:
            - uses: actions/checkout@v2

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v1
              with:
                terraform_version: 1.5.0

            - name: Terraform Init
              working-directory: ./my-infrastructure
              run: terraform init

            - name: Terraform Apply
              working-directory: ./my-infrastructure
              run: terraform apply -auto-approve