name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request: {}

jobs:
  greet:
    name: Say hello
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print greeting
        run: |
          echo "Hello from CI — running on ${{ runner.os }}"

  test:
    name: Terraform checks
    runs-on: ubuntu-latest
    needs: greet
    defaults:
      run:
        working-directory: my-infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f Dockerfile ]; then
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Dockerfile status
        run: |
          if [ "${{ steps.detect.outputs.has_docker }}" = "true" ]; then
            echo "Dockerfile found — image build will run"
          else
            echo "No Dockerfile found — skipping image build steps"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Show workspace files
        run: ls -la

      - name: Build image (cache enabled)
        if: steps.detect.outputs.has_docker == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: |
            ${{ github.repository }}:${{ github.sha }}
            ${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish image to ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f Dockerfile ]; then
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no Dockerfile
        if: steps.detect.outputs.has_docker == 'false'
        run: |
          echo "No Dockerfile found in repository — skipping publish"
          exit 0

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Push image to ACR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.repository }}:${{ github.sha }}
            ${{ secrets.ACR_NAME }}.azurecr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
